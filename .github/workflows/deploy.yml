name: Deploy To EC2 (Compose)

on:
  push:
    #    branches: [ "main" ]
    branches: [ "PASS-013-FIX-DEPLOYMENT-PIPELINE" ]

  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: ${{ secrets.S3_DEPLOY_BUCKET }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      # Step 1. Code checkout
      - name: Github Repository File Checkout
        uses: actions/checkout@v4

      # Step 2. AWS Authentication
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ------------------------------------------------------

      # Step3. Java Build
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'gradle' # Gradle 캐시 자동 활성화 (빌드 속도 높이기)

      # Step4. Config 생성
      - name: Create application.yml
        run: echo '${{ secrets.APPLICATION_YML }}' > ./src/main/resources/application.yml

      - name: Create .env for Docker Compose
        run: echo '${{ secrets.DOCKER_COMPOSE_ENV }}' > .env

      # Step5. Build
      - name: Build JAR
        run: ./gradlew clean build -x test

      - name: Rename Jar
        run: mv ./build/libs/*SNAPSHOT.jar ./passfolio.jar

      # Step6. Packaging deploy
      - name: Package deploy files
        run: |
          mkdir deploy
          mv passfolio.jar deploy/
          cp docker-compose.prod.yml deploy/docker-compose.yml
          mv .env deploy/
          tar -czf deploy.tar.gz deploy

      # Step7. S3 Upload
      - name: Upload to S3
        run: |
          aws s3 cp deploy.tar.gz s3://${{ env.S3_BUCKET }}/deploy.tar.gz

      # Step8. SSM Deployment (안정화 버전)
      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy via SSM" \
            --parameters commands='[
              "set -ex",
              "export PATH=$PATH:/usr/local/bin:/usr/bin:/snap/bin:/sbin:/usr/sbin",
              "trap '\''rm -rf /home/ubuntu/deploy || true'\'' EXIT",

              "echo 🟢 Step 1. Download from S3",
              "S3_BUCKET_NAME=${{ env.S3_BUCKET }}",
              "aws s3 cp s3://$S3_BUCKET_NAME/deploy.tar.gz /home/ubuntu/deploy.tar.gz",

              "cd /home/ubuntu",
              "rm -rf deploy || true",
              "mkdir deploy",
              "tar -xzf deploy.tar.gz -C deploy",

              "echo 🟢 Step 2. Prepare",
              "rm -rf /home/ubuntu/passfolio/app || true",
              "mkdir -p /home/ubuntu/passfolio/app",
              "mv deploy/deploy/passfolio.jar /home/ubuntu/passfolio/app/passfolio.jar",
              "mkdir -p /home/ubuntu/passfolio/infra",
              "mv deploy/deploy/docker-compose.yml /home/ubuntu/passfolio/infra/",
              "mv deploy/deploy/.env /home/ubuntu/passfolio/infra/",

              "echo 🟢 Step 3. Start docker compose build",
              "cd /home/ubuntu/passfolio/infra",
              "set -a && . ./.env && set +a", 
              "docker compose up -d",
              "sleep 5",

              "echo 🟡 Step 4. Redis Test",
              "docker exec redis-container redis-cli -a $REDIS_PASSWORD ping",

              "echo 🟢 Step 5. Restart Spring",
              "systemctl restart passfolio.service",

              "echo 🟢 Step 6. Health Check",
              "for i in {1..40}; do",
              "  if curl -fs http://localhost:8080/api/v1/system/monitor/health > /dev/null; then",
              "    echo ✅ HEALTH CHECK SUCCESS, DEPLOYMENT COMPLETE!",
              "    aws s3 rm s3://$S3_BUCKET_NAME/deploy.tar.gz",
              "    exit 0",
              "  fi",
              "  echo 💡 ($i/40) Spring Boot 시작 대기 중...",
              "  sleep 5",
              "done",

              "echo 🔴 FAIL, STOP DEPLOYMENT",
              "exit 1"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "🟡 COMMAND_ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true

          echo "===== 🟢 STDOUT ====="
          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text

          echo "===== 🔴 STDERR ====="
          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardErrorContent" \
            --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          echo "🟡 STATUS: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "🔴 DEPLOY FAILED"
            exit 1
          fi
