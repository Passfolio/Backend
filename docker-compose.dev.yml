services:
  postgres:
    image: postgres:16
    container_name: postgres-container
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    container_name: redis-container
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend-network

  # SMTP 1025 → 앱 spring.mail, 웹 UI 8025 → 수신 메일 확인 (MailHog)
  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    container_name: mailhog-container
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - backend-network

networks:
  backend-network:

volumes:
  postgres_data:
  redis_data: