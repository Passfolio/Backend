spring:
  config:
    activate:
      on-profile: dev # dev 프로필이 활성화될 때만 적용하겠다.

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show-sql: true
        jdbc:
          time_zone: UTC

  cloud:
    aws:
      credentials:
        access-key: ${AWS_IAM_ACCESS_KEY} # // Only Local 환경에서만
        secret-key: ${AWS_IAM_SECRET_KEY} # // Only Local 환경에서만

  # 기본: MailHog(localhost:1025, STARTTLS 끔). Gmail 쓰면 .env에 MAIL_HOST/PORT + MAIL_STARTTLS=true, MAIL_SMTP_AUTH=true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    group: ${MAIL_GROUP:Passfolio (dev)}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          debug: false
          connectiontimeout: 10000
          starttls:
            enable: ${MAIL_STARTTLS:false}
            required: ${MAIL_STARTTLS_REQUIRED:false}
          writetimeout: 10000
          timeout: 10000

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type: trace

jwt:
  secret: ${JWT_SECRET_KEY:ZGVva2l2ZXNlcnZlcnRlYW1hbmRvdGhlcnNmaWdodGluZw==}
  atk-exp-min: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:30}
  rtk-exp-week: ${JWT_REFRESH_TOKEN_EXPIRATION_WEEKS:2}

app:
  # 개발 환경 테스트용: localhost:5173과 localhost:3000 모두 지원
  # Origin/Referer 헤더에 따라 자동으로 선택됨
  front-redirect-uri: "${FRONT_REDIRECT_URI:http://localhost:5173/oauth/callback,http://localhost:3000/oauth/callback}"
  front-base-url: "${FRONT_BASE_URL:http://localhost:5173,http://localhost:3000}"
  system-auth:
    enabled: true
    # .env 예: SYSTEM_AUTH_EMAIL_ALLOWLIST=dev@example.com,qa@example.com (비어 있으면 가입·메일 전부 거절)

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true