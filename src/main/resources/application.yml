server: # t3.small environment setup -> need to be optimized
  tomcat:
    threads:
      max: 120
      min-spare: 20

spring:
  # Time Zone Setup ---------------------------------------------------------
  jackson:
    time-zone: Asia/Seoul # 모든 시간대 응답을 KST로 통일
    serialization:
      write-dates-as-timestamps: false # WHAT

  # Run Profile Environment
  profiles:
    active: dev # 개발할 때는 dev, 배포할 때는 prod

  # Database Setup ---------------------------------------------------------
  ## RDB Setup ---------------------------------------------------------
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?reWriteBatchedInserts=true&stringtype=unspecified
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 6 # HikariCP Recommendation : vCPU * 2 + alpha
      minimum-idle: 6       # 고정해두는 게 튀는 부하 방지에 유리
      connection-timeout: 30000 # wait 30s

  ## NoSQL (Redis) Setup ---------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 8 # 48
          max-idle: 8 # 32
          min-idle: 2 # 8
          max-wait: 1000ms # 5000ms

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    group: ${MAIL_GROUP:Passfolio}
    properties:
      mail:
        smtp:
          # Gmail 등: auth=true, starttls=true, port 587 / MailHog: auth=false, starttls=false, port 1025
          auth: ${MAIL_SMTP_AUTH:false}
          debug: false
          connectiontimeout: 10000
          starttls:
            enable: ${MAIL_STARTTLS:true}
            required: ${MAIL_STARTTLS_REQUIRED:true}
          writetimeout: 10000
          timeout: 10000

  # AWS Storage Setup ---------------------------------------------------------
  cloud:
    aws:
      s3:
        bucket: ${AWS_S3_BUCKET_NAME}
      region:
        static: ap-northeast-2

  # Security Setup ---------------------------------------------------------
  ## OAuth2 Setup
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${OAUTH_GITHUB_CLIENT_ID}
            client-secret: ${OAUTH_GITHUB_CLIENT_SECRET}
            client-name: GitHub
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - read:user
              - user:email
              - repo
              - read:org

# Utils Section ----------------------------------------------
app:
  cookie:
    secure: false
    cookie-atk: "ATK"
    cookie-rtk: "RTK"
    same-site: "Strict"
    atk-apply-path: "/"
    rtk-apply-path: "/api/v1"

  # Ex: "http://localhost:5173/oauth/callback,https://domain.com/oauth/callback"
  front-redirect-uri: "${FRONT_REDIRECT_URI:http://localhost:5173/oauth/callback}"
  # Ex: "http://localhost:5173,https://domain.com"
  front-base-url: "${FRONT_BASE_URL:http://localhost:5173}"
  allowed-origins: "${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}"
  backend-base-url: "${BACKEND_BASE_URL:http://localhost:8080}"

  # 시스템 로그인(이메일+비밀번호): 테스트·관리자 확장. 운영에서는 false 권장.
  system-auth:
    enabled: ${SYSTEM_AUTH_ENABLED:false}
    # .env SYSTEM_AUTH_EMAIL_ALLOWLIST=a@x.com,b@y.com — 가입·메일 발송·코드 검증 모두 이 목록에 있는 이메일만 허용. 비어 있으면 전부 거절.
    email-allowlist: ${SYSTEM_AUTH_EMAIL_ALLOWLIST:}

  # 공공데이터포털 — 대학·학과 정보 (tn_pubr_public_univ_major_api)
  gov-data:
    univ-major:
      base-url: "https://api.data.go.kr/openapi/tn_pubr_public_univ_major_api"
      service-key: ${APP_GOV_DATA_UNIV_SERVICE_KEY:}

hmac:
  secret: ${HMAC_SECRET_KEY} # at least 32 characters long

cdn:
  base-url: ${CDN_BASE_URL:} # CDN이 있다면 설정, 없으면 빈 문자열 (S3 URL 사용)

### OAuth2
github:
  token:
    encryption-key: ${GITHUB_TOKEN_ENCRYPTION_KEY} # AES-256 key (32 bytes, Base64 encoded)
    ttl-hours: 8
  cache:
    repos-ttl-minutes: 5

ratelimit:
  enabled: true
  redis:
    timeout-fail-open: 200ms     # limiter 장애 시 빠르게 통과
    timeout-fail-closed: 500ms   # auth는 차단하되 짧게 실패
  expiration:
    refill-to-max-jitter: 10s
  failure:
    mode: FAIL_OPEN             # ??? FAIL_OPEN, auth? ????? failClosed=true? ???
  key:
    namespace: ratelimit
    user-prefix: user
    ip-prefix: ip
  logging:
    backend-error-min-interval-ms: 1000
  proxy:
    trusted-cidrs: ${TRUSTED_CIDRS} # ex. 172.18.0.0/20,172.39.16.0/20, ...

# Monitoring Setup ------------------------------------------------------------
management:
  endpoints:
    web:
      base-path: ${ACTUATOR_ENDPOINT} # Custom Path
      exposure:
        include: "health,prometheus" # health? prometheus? ?? (env, beans ? ??)
  endpoint:
    health:
      show-details: always # DB, Disk, Redis -> Detail Connection Status
    prometheus:
      enabled: true # Prometheus Scrape ???
  metrics:
    tags:
      application: ${spring.application.name:Passfolio}

# AWS Service
aws:
  stepfunction:
    arn: ${STEP_FUNCTION_ARN:}

# Swagger (Prod에선 Open 비활성화: 릴리즈 전까지만 오픈->주석처리)
springdoc:
  swagger-ui:
    path: ${SWAGGER_UI_PATH}   # UI
#      enabled: false
  api-docs:
    path: ${SWAGGER_JSON_PATH}  # JSON
#      enabled: false
# TODO: MANAGER 계정만 Swagger Path 허용
